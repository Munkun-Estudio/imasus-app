      eyebrow: "Talleres IMASUS"
      heading: "Herramientas de imaginería para estudiantes que trabajan en retos del mundo real."
      lead: "IMASUS App es la plataforma de talleres para estudiantes y facilitadores que desarrollan nuevas respuestas a grandes desafíos a través del enfoque de imaginería inspirado en Diane Nijs."
      visit_imasus: "Visitar IMASUS"
      read_interview: "Leer la entrevista sobre imaginería"
      status: "Proyecto en fase de desarrollo"
      why_title: "Por qué existe esta aplicación"
      why_text: "IMASUS App apoya recorridos de taller donde los estudiantes pasan de un desafío amplio a la reflexión estructurada, el desarrollo de conceptos y el planteamiento inicial de soluciones, utilizando el enfoque de imaginería."
      who_title: "A quién va dirigida"
      who_text: "Estudiantes y facilitadores que participan en talleres IMASUS en Grecia, Italia y España. Cada taller reúne equipos interdisciplinares para abordar retos reales de sostenibilidad en la industria textil."
      what_title: "Qué puedes hacer"
      what_text: "Explorar una base de datos de materiales, trabajar con módulos de formación, registrar tu proceso con fotos y vídeos, desarrollar prototipos y publicar una página pública de proyecto resumiendo tu recorrido."
