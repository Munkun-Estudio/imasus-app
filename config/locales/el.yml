      eyebrow: "Εργαστήρια IMASUS"
      heading: "Εργαλεία φαντασίας για φοιτητές που εργάζονται σε πραγματικές προκλήσεις."
      lead: "Το IMASUS App είναι η πλατφόρμα εργαστηρίων για φοιτητές και διευκολυντές που αναπτύσσουν νέες απαντήσεις σε μεγάλες προκλήσεις μέσω της προσέγγισης φαντασίας εμπνευσμένης από τη Diane Nijs."
      visit_imasus: "Επισκεφθείτε το IMASUS"
      read_interview: "Διαβάστε τη συνέντευξη για τη φαντασία"
      status: "Έργο σε φάση ανάπτυξης"
      why_title: "Γιατί υπάρχει αυτή η εφαρμογή"
      why_text: "Η εφαρμογή IMASUS υποστηρίζει διαδρομές εργαστηρίων όπου οι φοιτητές μεταβαίνουν από μια ευρεία πρόκληση σε δομημένο στοχασμό, ανάπτυξη ιδεών και αρχική διατύπωση λύσεων, χρησιμοποιώντας την προσέγγιση φαντασίας."
      who_title: "Σε ποιους απευθύνεται"
      who_text: "Φοιτητές και διευκολυντές που συμμετέχουν σε εργαστήρια IMASUS στην Ελλάδα, την Ιταλία και την Ισπανία. Κάθε εργαστήριο φέρνει κοντά διεπιστημονικές ομάδες για να αντιμετωπίσουν πραγματικές προκλήσεις βιωσιμότητας στην κλωστοϋφαντουργία."
      what_title: "Τι μπορείτε να κάνετε"
      what_text: "Εξερευνήστε μια βάση δεδομένων υλικών, εργαστείτε με εκπαιδευτικές ενότητες, καταγράψτε τη διαδικασία σας με φωτογραφίες και βίντεο, αναπτύξτε πρωτότυπα και δημοσιεύστε μια δημόσια σελίδα έργου που συνοψίζει τη διαδρομή σας."
