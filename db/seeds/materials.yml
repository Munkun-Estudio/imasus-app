  description:
    en: Soy Silk is a fiber that is made from the waste produced by soy milk and tofu production. Through a heated, wet spinning process, a liquid form of the soy protein, called okara, is forced through a spinneret and cooled to produce filaments. The resulting fiber is slick, smooth, and best spun at a high twist unless blended. It has a stronger tensile strength than wool and a lovely drape. While prone to piling over time, it has the same moisture absorption as cotton.
