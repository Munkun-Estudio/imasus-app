- trade_name: Rustic Wool
  material_of_origin: Wool
  availability_status: commercial
  description:
    en: Rustic wool is made from wool that is a byproduct of sheep farming and is often discarded or undervalued. By using this existing resource, it helps reduce agricultural waste and makes better use of materials already produced. It also has a lower environmental impact, as it does not require additional processing or new raw material production, while providing a natural, biodegradable alternative to synthetic fibers.
  interesting_properties:
    en: In Europe, much of the wool from sheep farming is undervalued and treated as waste due to low market demand and high processing costs. As a result, significant quantities are discarded, burned, or buried, despite being a natural and biodegradable material with potential for sustainable applications.
  structure: {}
  what_problem_it_solves:
    en: Helps address agricultural waste and underutilized resources by valorizing wool that is often discarded or of low commercial value. It provides a natural, biodegradable, and insulating material, offering a low-impact alternative to synthetic fibers while supporting more circular and regenerative use of animal-based resources.
