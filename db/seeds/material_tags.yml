# IMASUS materials-database tag vocabulary.
#
# Three facets power the chip-filter rail on the materials index:
#
#   * origin_type       — what kind of source the material comes from.
#   * textile_imitating — which conventional fabric the material replaces.
#   * application       — what the material can be used to make.
#
# Each entry carries an English `name` — the source-of-truth — and optional
# slots for `es`, `it`, and `el` to be filled in over time. Missing locales
# fall back to English at read time via the Translatable concern.
#
# Re-running this seed is idempotent: entries are matched by (facet, slug),
# so renaming a slug will create a new record rather than rename in place.
# Coordinate slug renames with the materials.yml entries that reference them.

# ---------------------------------------------------------------------------
# origin_type
# ---------------------------------------------------------------------------

- facet: origin_type
  slug: plants
  name:
    en: Plants

- facet: origin_type
  slug: fungi
  name:
    en: Fungi

